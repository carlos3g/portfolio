# Deploys a Vercel preview for every pull request.
#
# Required repository secrets:
#   VERCEL_TOKEN       — personal/team token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — `vercel link` writes it to .vercel/project.json
#   VERCEL_PROJECT_ID  — same file
#
# If you keep Vercel's built-in Git integration enabled, disable it for this
# repo to avoid duplicate deployments — or delete this workflow.

name: Vercel Preview

on:
  pull_request:

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            if (!url) return;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🟢 Preview deployed: ${url}`,
            });
